<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealthpoint Poll — Live Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* TV display overrides */
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: #162e5a;
      color: #ffffff;
    }
  </style>
</head>
<body class="display-body">
  <div class="display-container">
    <!-- Header -->
    <div class="display-header">
      <div class="display-logo">WEALTHPOINT</div>
      <div class="display-counter">
        <span class="counter-number" id="totalCount">0</span>
        <span class="counter-label">advisers have shared their perspective</span>
      </div>
    </div>

    <!-- Slide: Q1 -->
    <div class="display-slide active" id="slideQ1">
      <div class="slide-content">
        <h2 class="slide-question">What will drive your business success in the next 12 months?</h2>
        <div class="display-chart" id="displayQ1Chart"></div>
      </div>
    </div>

    <!-- Slide: Q2 -->
    <div class="display-slide" id="slideQ2">
      <div class="slide-content">
        <h2 class="slide-question">What support matters most to your business?</h2>
        <div class="display-chart" id="displayQ2Chart"></div>
      </div>
    </div>

    <!-- Slide: Q3 -->
    <div class="display-slide" id="slideQ3">
      <div class="slide-content">
        <h2 class="slide-question">What trend will shape advice demand in 2026?</h2>
        <div class="display-chart" id="displayQ3Chart"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="display-footer">
      <div class="qr-area">
        <div class="qr-placeholder" id="qrCode">
          <!-- Placeholder QR code -->
          <svg width="120" height="120" viewBox="0 0 120 120">
            <rect width="120" height="120" rx="8" fill="white"/>
            <rect x="10" y="10" width="30" height="30" rx="2" fill="#162e5a"/>
            <rect x="80" y="10" width="30" height="30" rx="2" fill="#162e5a"/>
            <rect x="10" y="80" width="30" height="30" rx="2" fill="#162e5a"/>
            <rect x="15" y="15" width="20" height="20" rx="1" fill="white"/>
            <rect x="85" y="15" width="20" height="20" rx="1" fill="white"/>
            <rect x="15" y="85" width="20" height="20" rx="1" fill="white"/>
            <rect x="20" y="20" width="10" height="10" fill="#162e5a"/>
            <rect x="90" y="20" width="10" height="10" fill="#162e5a"/>
            <rect x="20" y="90" width="10" height="10" fill="#162e5a"/>
            <rect x="50" y="10" width="8" height="8" fill="#162e5a"/>
            <rect x="50" y="25" width="8" height="8" fill="#162e5a"/>
            <rect x="62" y="10" width="8" height="8" fill="#162e5a"/>
            <rect x="50" y="50" width="10" height="10" fill="#162e5a"/>
            <rect x="65" y="50" width="10" height="10" fill="#162e5a"/>
            <rect x="50" y="65" width="10" height="10" fill="#162e5a"/>
            <rect x="80" y="50" width="8" height="8" fill="#162e5a"/>
            <rect x="95" y="65" width="8" height="8" fill="#162e5a"/>
            <rect x="80" y="80" width="8" height="8" fill="#162e5a"/>
            <rect x="95" y="80" width="8" height="8" fill="#162e5a"/>
            <rect x="80" y="95" width="8" height="8" fill="#162e5a"/>
            <rect x="95" y="95" width="8" height="8" fill="#162e5a"/>
            <rect x="50" y="80" width="8" height="8" fill="#162e5a"/>
            <rect x="62" y="95" width="8" height="8" fill="#162e5a"/>
          </svg>
        </div>
        <span class="qr-label">Scan to participate</span>
      </div>
      <div class="display-branding">
        <span class="display-tagline">Conference Live Poll</span>
        <div class="slide-timer">
          <svg class="timer-ring" viewBox="0 0 40 40">
            <circle class="timer-ring-bg" cx="20" cy="20" r="17" />
            <circle class="timer-ring-progress" cx="20" cy="20" r="17" />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/display.js"></script>
</body>
</html>
