<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealthpoint Poll — Live Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- all display styles are inline to avoid conflicts -->
  <style>
    /* TV display overrides and responsive fixes */
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at 50% 40%, #133a6b 0%, #0d2a4f 40%, #091e38 100%);
      color: white;
      font-family: 'Montserrat', sans-serif;
    }
    
    .display-container {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      height: 100vh;
      padding: 2.5vh 3vw;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    /* Header */
    .display-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5vh;
    }
    
    .display-logo img {
      height: clamp(28px, 4.5vh, 64px);
      width: auto;
    }
    
    .display-counter {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    
    .counter-number {
      font-size: clamp(32px, 5vw, 84px);
      font-weight: 700;
      color: #00B4D8;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    
    .counter-label {
      font-size: clamp(10px, 1.2vw, 20px);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
      text-align: left;
      max-width: 220px;
      padding-bottom: 2px;
    }
    
    /* Slide content area */
    .display-slide {
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .display-slide.active {
      display: flex;
    }
    
    .slide-content {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .slide-question, .slide-content .slide-question, h2.slide-question {
      font-size: clamp(20px, 4vw, 72px) !important;
      font-weight: 700 !important;
      color: white !important;
      margin: 6vh 0 3vh 0 !important;
      line-height: 1.15 !important;
      text-align: center !important;
    }
    
    /* TV Chart Bars */
    .display-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(8px, 1.5vh, 20px);
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }
    
    .display-chart-row {
      display: flex;
      align-items: center;
      height: clamp(28px, 4.5vh, 60px);
      width: 100%;
    }
    
    .display-chart-label {
      color: white;
      font-size: clamp(12px, 2vw, 32px);
      font-weight: 500;
      text-align: right;
      width: clamp(180px, 30%, 350px);
      margin-right: clamp(10px, 2vw, 32px);
      flex-shrink: 0;
    }
    
    .display-bar-track {
      flex: 1;
      max-width: clamp(300px, 45vw, 550px);
      height: 100%;
      background-color: rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .display-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0891B2 0%, #38BDF8 100%);
      border-radius: 8px;
      transition: width 0.8s ease-out;
      width: 0;
    }
    
    .display-bar-value {
      color: rgba(255,255,255,0.9);
      font-size: clamp(12px, 1.8vw, 28px);
      font-weight: 600;
      margin-left: clamp(10px, 1.5vw, 24px);
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    /* Footer - override external CSS */
    .display-footer {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      padding-top: 1vh;
      position: relative !important;
      bottom: auto !important;
      left: auto !important;
      right: auto !important;
    }
    
    /* QR section - LEFT, stacked vertically - override external absolute positioning */
    .qr-section {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      gap: 6px;
      position: relative !important;
      bottom: auto !important;
      left: auto !important;
    }
    
    .qr-container {
      background: white;
      padding: 10px;
      border-radius: 12px;
    }
    
    .qr-container img {
      width: clamp(80px, 8vh, 140px);
      height: clamp(80px, 8vh, 140px);
      display: block;
    }
    
    .qr-text {
      font-size: clamp(10px, 1.1vw, 18px);
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      margin-top: 6px;
    }
    
    /* Ensure QR section stays left, not absolute */
    .qr-section {
      position: relative !important;
      flex-direction: column !important;
    }
    
    /* Branding + circular SVG timer - RIGHT */
    .display-branding {
      text-align: center;
    }
    
    .display-tagline {
      font-size: clamp(10px, 1.2vw, 20px);
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      display: block;
      margin-top: 8px;
    }
    
    .slide-timer {
      display: flex;
      justify-content: center;
    }
    
    .timer-ring {
      width: clamp(60px, 6vw, 120px);
      height: clamp(60px, 6vw, 120px);
      transform: rotate(-90deg);
    }
    
    .timer-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.15);
      stroke-width: 2;
    }
    
    .timer-ring-progress {
      fill: none;
      stroke: #00B4D8;
      stroke-width: 2;
      stroke-dasharray: 106.81;
      stroke-dashoffset: 106.81;
      stroke-linecap: round;
    }
    
    .timer-ring-progress.animating {
      animation: timer-fill 10s linear forwards;
    }
    
    @keyframes timer-fill {
      from { stroke-dashoffset: 106.81; }
      to { stroke-dashoffset: 0; }
    }
    
    /* Extra large displays (65" TVs and above) */
    @media screen and (min-width: 1920px) and (min-height: 1080px) {
      .slide-question, .slide-content .slide-question, h2.slide-question {
        font-size: clamp(48px, 6vw, 120px) !important;
      }
      
      .counter-number {
        font-size: clamp(56px, 6vw, 110px);
      }
      
      .counter-label {
        font-size: clamp(16px, 1.5vw, 28px);
        max-width: 280px;
      }
      
      .display-chart-label {
        font-size: clamp(20px, 2.5vw, 42px);
        width: clamp(250px, 32%, 400px);
      }
      
      .display-bar-value {
        font-size: clamp(18px, 2.2vw, 36px);
      }
      
      .display-chart-row {
        height: clamp(45px, 5.5vh, 75px);
      }
      
      .display-logo img {
        height: clamp(44px, 5.5vh, 80px);
      }
      
      .qr-container img {
        width: clamp(100px, 10vh, 160px);
        height: clamp(100px, 10vh, 160px);
      }
      
      .qr-text {
        font-size: clamp(14px, 1.4vw, 24px);
      }
      
      .display-tagline {
        font-size: clamp(14px, 1.5vw, 26px);
      }
      
      .timer-ring {
        width: clamp(80px, 7vw, 140px);
        height: clamp(80px, 7vw, 140px);
      }
    }
  </style>
</head>
<body class="display-body">
  <div class="display-container">
    <!-- Header -->
    <div class="display-header">
      <div class="display-logo">
        <img src="/wealthpoint-logo-white.png" alt="Wealthpoint" />
      </div>
      <div class="display-counter">
        <span class="counter-number" id="totalCount">0</span>
        <span class="counter-label">ADVISERS HAVE SHARED THEIR PERSPECTIVE</span>
      </div>
    </div>

    <!-- Slide: Q1 -->
    <div class="display-slide active" id="slideQ1">
      <div class="slide-content">
        <h2 class="slide-question">What will drive your business success in the next 12 months?</h2>
        <div class="display-chart" id="displayQ1Chart"></div>
      </div>
    </div>

    <!-- Slide: Q2 -->
    <div class="display-slide" id="slideQ2">
      <div class="slide-content">
        <h2 class="slide-question">What support matters most to your business?</h2>
        <div class="display-chart" id="displayQ2Chart"></div>
      </div>
    </div>

    <!-- Slide: Q3 -->
    <div class="display-slide" id="slideQ3">
      <div class="slide-content">
        <h2 class="slide-question">What trend will shape advice demand in 2026?</h2>
        <div class="display-chart" id="displayQ3Chart"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="display-footer">
      <div class="qr-section">
        <div class="qr-container">
          <img src="/qr-code.png" alt="QR Code" />
        </div>
        <span class="qr-text">Scan to participate</span>
      </div>
      <div class="display-branding">
        <div class="slide-timer">
          <svg class="timer-ring" viewBox="0 0 40 40">
            <circle class="timer-ring-bg" cx="20" cy="20" r="17" />
            <circle class="timer-ring-progress" id="timerProgress" cx="20" cy="20" r="17" />
          </svg>
        </div>
        <span class="display-tagline">Conference Live Poll</span>
      </div>
    </div>
  </div>

  <script src="/js/display.js"></script>
</body>
</html>
