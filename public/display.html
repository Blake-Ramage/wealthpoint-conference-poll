<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealthpoint Poll — Live Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style-new.css">
  <style>
    /* TV display overrides and responsive fixes */
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at 50% 40%, #133a6b 0%, #0d2a4f 40%, #091e38 100%);
      color: white;
      font-family: 'Montserrat', sans-serif;
    }
    
    .display-container {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      height: 100vh;
      padding: 2.5vh 3vw;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    /* Header */
    .display-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5vh;
    }
    
    .display-logo img {
      height: clamp(28px, 3.5vh, 44px);
      width: auto;
    }
    
    .display-counter {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    
    .counter-number {
      font-size: clamp(32px, 3.5vw, 56px);
      font-weight: 700;
      color: #00B4D8;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    
    .counter-label {
      font-size: clamp(10px, 0.8vw, 14px);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
      text-align: left;
      max-width: 180px;
      padding-bottom: 2px;
    }
    
    /* Slide content area */
    .display-slide {
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .display-slide.active {
      display: flex;
    }
    
    .slide-content {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .slide-question {
      font-size: clamp(20px, 2.5vw, 42px);
      font-weight: 700;
      color: white;
      margin: 0 0 1vh 0;
      line-height: 1.15;
    }
    
    /* Ensure chart bars are compact */
    .chart-row {
      margin-bottom: 0.5vh;
    }
    
    /* Footer */
    .display-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1vh;
    }
    
    /* QR section - LEFT, stacked vertically */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    
    .qr-container {
      background: white;
      padding: 10px;
      border-radius: 12px;
    }
    
    .qr-container img {
      width: clamp(50px, 5vh, 70px);
      height: clamp(50px, 5vh, 70px);
      display: block;
    }
    
    .qr-text {
      font-size: clamp(10px, 0.8vw, 14px);
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      margin-top: 6px;
    }
    
    /* QR: stack vertically like design */
    .qr-section {
      flex-direction: column;
    }
    
    /* Branding + circular SVG timer - RIGHT */
    .display-branding {
      text-align: center;
    }
    
    .display-tagline {
      font-size: clamp(10px, 0.9vw, 16px);
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      display: block;
      margin-top: 8px;
    }
    
    .slide-timer {
      display: flex;
      justify-content: center;
    }
    
    .timer-ring {
      width: clamp(60px, 5vw, 100px);
      height: clamp(60px, 5vw, 100px);
      transform: rotate(-90deg);
    }
    
    .timer-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.15);
      stroke-width: 2;
    }
    
    .timer-ring-progress {
      fill: none;
      stroke: #00B4D8;
      stroke-width: 2;
      stroke-dasharray: 106.81;
      stroke-dashoffset: 106.81;
      stroke-linecap: round;
    }
    
    .timer-ring-progress.animating {
      animation: timer-fill 10s linear forwards;
    }
    
    @keyframes timer-fill {
      from { stroke-dashoffset: 106.81; }
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body class="display-body">
  <div class="display-container">
    <!-- Header -->
    <div class="display-header">
      <div class="display-logo">
        <img src="/wealthpoint-logo-white.png" alt="Wealthpoint" />
      </div>
      <div class="display-counter">
        <span class="counter-number" id="totalCount">0</span>
        <span class="counter-label">ADVISERS HAVE SHARED THEIR PERSPECTIVE</span>
      </div>
    </div>

    <!-- Slide: Q1 -->
    <div class="display-slide active" id="slideQ1">
      <div class="slide-content">
        <h2 class="slide-question">What will drive your business success in the next 12 months?</h2>
        <div class="display-chart" id="displayQ1Chart"></div>
      </div>
    </div>

    <!-- Slide: Q2 -->
    <div class="display-slide" id="slideQ2">
      <div class="slide-content">
        <h2 class="slide-question">What support matters most to your business?</h2>
        <div class="display-chart" id="displayQ2Chart"></div>
      </div>
    </div>

    <!-- Slide: Q3 -->
    <div class="display-slide" id="slideQ3">
      <div class="slide-content">
        <h2 class="slide-question">What trend will shape advice demand in 2026?</h2>
        <div class="display-chart" id="displayQ3Chart"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="display-footer">
      <div class="qr-section">
        <div class="qr-container">
          <img src="/qr-code.png" alt="QR Code" />
        </div>
        <span class="qr-text">Scan to participate</span>
      </div>
      <div class="display-branding">
        <div class="slide-timer">
          <svg class="timer-ring" viewBox="0 0 40 40">
            <circle class="timer-ring-bg" cx="20" cy="20" r="17" />
            <circle class="timer-ring-progress" id="timerProgress" cx="20" cy="20" r="17" />
          </svg>
        </div>
        <span class="display-tagline">Conference Live Poll</span>
      </div>
    </div>
  </div>

  <script src="/js/display.js"></script>
</body>
</html>
