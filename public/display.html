<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealthpoint Poll — Live Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style-new.css">
  <style>
    /* TV display overrides and responsive fixes */
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at center, #0F3060 0%, #0B2545 100%);
      color: white;
      font-family: 'Montserrat', sans-serif;
    }
    
    .display-container {
      display: grid;
      grid-template-rows: 120px 1fr 100px;
      grid-template-columns: 1fr;
      height: 100vh;
      padding: 40px;
      box-sizing: border-box;
    }
    
    /* Header with proper spacing */
    .display-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    
    .display-logo img {
      height: 40px;
      width: auto;
    }
    
    .display-counter {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    
    .counter-number {
      font-size: clamp(36px, 3.5vw, 64px);
      font-weight: 700;
      color: #00B4D8;
      font-variant-numeric: tabular-nums;
    }
    
    .counter-label {
      font-size: clamp(14px, 1.2vw, 22px);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }
    
    /* Slide content area */
    .display-slide {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    
    .display-slide.active {
      display: flex;
    }
    
    .slide-question {
      font-size: 48px;
      font-weight: 700;
      color: white;
      margin: 0 0 40px 0;
      max-width: 80%;
      line-height: 1.2;
    }
    
    /* Footer area with proper positioning */
    .display-footer {
      position: relative;
      height: 100px;
    }
    
    /* QR section - bottom LEFT */
    .qr-section {
      position: absolute;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .qr-container {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .qr-container img {
      width: 70px;
      height: 70px;
    }
    
    .qr-text {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }
    
    /* Branding + circular SVG timer - bottom RIGHT */
    .display-branding {
      position: absolute;
      bottom: 0;
      right: 0;
      text-align: center;
    }
    
    .display-tagline {
      font-size: clamp(10px, 0.9vw, 16px);
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      display: block;
      margin-top: 8px;
    }
    
    .slide-timer {
      display: flex;
      justify-content: center;
    }
    
    .timer-ring {
      width: clamp(60px, 5vw, 100px);
      height: clamp(60px, 5vw, 100px);
      transform: rotate(-90deg);
    }
    
    .timer-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.15);
      stroke-width: 2;
    }
    
    .timer-ring-progress {
      fill: none;
      stroke: #00B4D8;
      stroke-width: 2;
      stroke-dasharray: 106.81;
      stroke-dashoffset: 106.81;
      stroke-linecap: round;
    }
    
    .timer-ring-progress.animating {
      animation: timer-fill 10s linear forwards;
    }
    
    @keyframes timer-fill {
      from { stroke-dashoffset: 106.81; }
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body class="display-body">
  <div class="display-container">
    <!-- Header -->
    <div class="display-header">
      <div class="display-logo">
        <img src="/wealthpoint-logo-white.png" alt="Wealthpoint" />
      </div>
      <div class="display-counter">
        <span class="counter-number" id="totalCount">0</span>
        <span class="counter-label">ADVISERS HAVE SHARED THEIR PERSPECTIVE</span>
      </div>
    </div>

    <!-- Slide: Q1 -->
    <div class="display-slide active" id="slideQ1">
      <div class="slide-content">
        <h2 class="slide-question">What will drive your business success in the next 12 months?</h2>
        <div class="display-chart" id="displayQ1Chart"></div>
      </div>
    </div>

    <!-- Slide: Q2 -->
    <div class="display-slide" id="slideQ2">
      <div class="slide-content">
        <h2 class="slide-question">What support matters most to your business?</h2>
        <div class="display-chart" id="displayQ2Chart"></div>
      </div>
    </div>

    <!-- Slide: Q3 -->
    <div class="display-slide" id="slideQ3">
      <div class="slide-content">
        <h2 class="slide-question">What trend will shape advice demand in 2026?</h2>
        <div class="display-chart" id="displayQ3Chart"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="display-footer">
      <div class="qr-section">
        <div class="qr-container">
          <img src="/qr-code.png" alt="QR Code" />
        </div>
        <span class="qr-text">Scan to participate</span>
      </div>
      <div class="display-branding">
        <div class="slide-timer">
          <svg class="timer-ring" viewBox="0 0 40 40">
            <circle class="timer-ring-bg" cx="20" cy="20" r="17" />
            <circle class="timer-ring-progress" id="timerProgress" cx="20" cy="20" r="17" />
          </svg>
        </div>
        <span class="display-tagline">Conference Live Poll</span>
      </div>
    </div>
  </div>

  <script src="/js/display.js"></script>
</body>
</html>
